{% extends 'base.html' %}

{% block content %}
<div class="page-shell">
    <div class="form-card">
        <h2>Create Project</h2>
        <p class="subtitle">Create your project and generate its AI plan in one step.</p>

        <form method="POST" class="styled-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn primary btn-block">Create & Generate</button>
        </form>
    </div>
</div>
{% endblock %}
