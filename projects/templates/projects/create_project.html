{% extends 'base.html' %}

{% block content %}
<div class="page-shell">
    <div class="form-card">
        <h2>Create Project</h2>
        <p class="subtitle">Create your project and generate its AI plan in one step.</p>

        <form method="POST" class="styled-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="btn-group">
                <button type="submit" class="btn primary">Create & Generate</button>
                <a href="{% url 'project_list' %}" class="btn ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
