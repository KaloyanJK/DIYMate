{% extends 'base.html' %}

{% block content %}

<section class="form-container" aria-labelledby="edit-project-title">

    <article class="form-card">

        <h1 id="edit-project-title">Edit Project</h1>
        <p class="subtitle">Saving changes will update the project only. AI generation stays manual on the project page.</p>

        <form method="POST">
            {% csrf_token %}
            
            <!-- FORM FIELDS -->
            <div class="form-group">
                <label class="field-label">Title</label>
                {{ form.title }}
            </div>

            <div class="form-group">
                <label class="field-label">Description</label>
                {{ form.description }}
            </div>

            <div class="form-group">
                <label class="field-label">Dimensions</label>
                {{ form.dimensions }}
            </div>

            <div class="form-group">
                <label class="field-label">Budget (£)</label>
                {{ form.budget }}
            </div>

            <div class="form-group">
                <label class="field-label">Image URL</label>
                {{ form.image_url }}
            </div>

            <!-- BUTTONS -->
            <div class="btn-group">
    
                <button type="submit" class="btn success">
                    Save Changes
                </button>

                <a href="{% url 'project_detail' project.id %}" class="btn ghost">
                    Cancel
                </a>

            </div>
        </form>

    </article>

</section>

{% endblock %}
