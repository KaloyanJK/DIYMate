{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <div class="form-card">

        <h2>Edit Project</h2>

        <form method="POST">
            {% csrf_token %}
            
            <!-- FORM FIELDS -->
            <div class="form-group">
                <label>Title</label>
                {{ form.title }}
            </div>

            <div class="form-group">
                <label>Description</label>
                {{ form.description }}
            </div>

            <div class="form-group">
                <label>Dimensions</label>
                {{ form.dimensions }}
            </div>

            <div class="form-group">
                <label>Budget (£)</label>
                {{ form.budget }}
            </div>

            <div class="form-group">
                <label>Image URL</label>
                {{ form.image_url }}
            </div>

            <!-- BUTTONS -->
            <div class="btn-group">
    
                <button type="submit" class="btn success">
                    Save Changes
                </button>

                <a href="{% url 'project_detail' project.id %}" class="btn ghost">
                    Cancel
                </a>

            </div>
        </form>

    </div>

</div>

{% endblock %}
