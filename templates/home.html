{% extends 'base.html' %}

{% block content %}

<section class="hero">
    <article class="hero-card">
        <h1>Plan Your DIY Projects with AI</h1>
        <p>
            Turn your ideas into structured build plans with materials, cost estimates,
            and step-by-step guidance.
        </p>

        <nav class="buttons" aria-label="Get started actions">
            {% if user.is_authenticated %}
            <a href="{% url 'project_list' %}">Get Started</a>
            {% else %}
            <a href="{% url 'account_login' %}?next={% url 'project_list' %}">Get Started</a>
            {% endif %}
        </nav>
    </article>

</section>

{% endblock %}
